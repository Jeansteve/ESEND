name: Deploy to PRODUCTION (Hostinger)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      - name: Force Copy API files to dist (Vite fix)
        run: mkdir -p dist/api && cp -r public/api/* dist/api/

      - name: Generate config.php from Secrets
        run: |
          cat <<EOF > dist/api/config.php
          <?php
          /**
           * ESEND API Config - PRODUCTION
           * Generated automatically via GitHub Actions - NE PAS MODIFIER MANUELLEMENT
           */
          
          error_reporting(0);
          ini_set('display_errors', 0);
          header('Content-Type: application/json; charset=utf-8');
          
          // Credentials Base de Données
          define('DB_HOST', '${{ secrets.DB_PROD_HOST }}');
          define('DB_NAME', '${{ secrets.DB_PROD_NAME }}');
          define('DB_USER', '${{ secrets.DB_PROD_USER }}');
          define('DB_PASS', '${{ secrets.DB_PROD_PASS }}');
          
          // Credentials SMTP (CRIT-01 : plus jamais en clair dans le code)
          define('SMTP_HOST', 'smtp.hostinger.com');
          define('SMTP_USER', '${{ secrets.SMTP_USER }}');
          define('SMTP_PASS', '${{ secrets.SMTP_PASS }}');
          define('SMTP_PORT', 465);
          
          \$options = [
              PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
              PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
              PDO::ATTR_EMULATE_PREPARES => false,
          ];
          
          \$dsn = "mysql:host=" . DB_HOST . ";dbname=" . DB_NAME . ";charset=utf8mb4";
          
          try {
              \$pdo = new PDO(\$dsn, DB_USER, DB_PASS, \$options);
          } catch (\PDOException \$e) {
              header('HTTP/1.1 500 Internal Server Error');
              echo json_encode(['success' => false, 'error' => 'Erreur de connexion DB']);
              exit;
          }
          
          // CORS restreint aux domaines autorisés uniquement (HIGH-01 : plus de wildcard *)
          \$allowedOrigins = ['https://esendnuisibles.fr', 'https://site-test.esendnuisibles.fr', 'https://www.esendnuisibles.fr'];
          \$origin = \$_SERVER['HTTP_ORIGIN'] ?? '';
          if (in_array(\$origin, \$allowedOrigins)) {
              header("Access-Control-Allow-Origin: \$origin");
              header('Vary: Origin');
          }
          header("Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS");
          header("Access-Control-Allow-Headers: Content-Type, Authorization");
          
          if (\$_SERVER['REQUEST_METHOD'] == 'OPTIONS') {
              exit;
          }
          EOF

      - name: Deploy to Hostinger PRODUCTION via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_PROD_SERVER }}
          username: ${{ secrets.FTP_PROD_USERNAME }}
          password: ${{ secrets.FTP_PROD_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          exclude: |
            **/node_modules/**
            **/.git/**
