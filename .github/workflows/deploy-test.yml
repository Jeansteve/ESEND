name: Deploy to TEST (Hostinger)

on:
  push:
    branches:
      - test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      - name: Force Copy API files to dist (Vite fix)
        run: mkdir -p dist/api && cp -r public/api/* dist/api/

      - name: Generate config.php from Template
        env:
          DB_HOST: ${{ secrets.DB_TEST_HOST }}
          DB_NAME: ${{ secrets.DB_TEST_NAME }}
          DB_USER: ${{ secrets.DB_TEST_USER }}
          DB_PASS: ${{ secrets.DB_TEST_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASSWORD }}
        run: |
          envsubst '$DB_HOST $DB_NAME $DB_USER $DB_PASS $SMTP_USER $SMTP_PASS' < public/api/config.template.php > dist/api/config.php

      - name: Deploy to Hostinger TEST via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_TEST_SERVER }}
          username: ${{ secrets.FTP_TEST_USERNAME }}
          password: ${{ secrets.FTP_TEST_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          exclude: |
            **/node_modules/**
            **/.git/**
